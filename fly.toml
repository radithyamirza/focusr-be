app = "focusr-be"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  SPRING_PROFILES_ACTIVE = "default"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/actuator/health"
    port = 8080
    timeout = "5s"
    type = "http"
